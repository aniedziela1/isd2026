global
    log /dev/log local0
    log /dev/log local1 notice
    daemon

    stats socket /run/haproxy/admin.sock mode 660 level admin

defaults
    log global
    mode http

    option httplog
    option dontlognull
    option log-health-checks

    timeout connect 1s
    timeout check 1s
    timeout client 30s
    timeout server 30s

frontend public-services
    mode http

    bind [2001:db8:20:10::a]:80
    bind [2001:db8:20:10::b]:80

    acl healthcare-vip dst 2001:db8:20:10::a
    acl fitness-vip dst 2001:db8:20:10::b

    use_backend healthcare-backend if healthcare-vip
    use_backend fitness-backend if fitness-vip

    default_backend reject-backend

backend healthcare-backend
    mode http
    balance roundrobin

    option httpchk GET /
    http-check expect status 200

    acl host_h1 req.hdr(host) -i h1.healthcare.com
    acl host_h2 req.hdr(host) -i h2.healthcare.com
    acl host_h3 req.hdr(host) -i h3.healthcare.com

    use-server healthcare-1 if host_h1
    use-server healthcare-2 if host_h2
    use-server healthcare-3 if host_h3

    source [2001:db8:2a:20::2] interface ens36.10
    default-server inter 5s fall 4 rise 2

    server healthcare-1 [2001:db8:2a:20::11]:80 check inter 5s fall 4 rise 2
    server healthcare-2 [2001:db8:2a:20::12]:80 check inter 5s fall 4 rise 2
    server healthcare-3 [2001:db8:2a:20::13]:80 check inter 5s fall 4 rise 2

backend fitness-backend
    mode http
    balance roundrobin

    option httpchk GET /
    http-check expect status 200

    acl host_f1 req.hdr(host) -i f1.fitness.com
    acl host_f2 req.hdr(host) -i f2.fitness.com
    acl host_f3 req.hdr(host) -i f3.fitness.com

    use-server fitness-1 if host_f1
    use-server fitness-2 if host_f2
    use-server fitness-3 if host_f3

    source [2001:db8:2b:20::2] interface ens36.20
    default-server inter 5s fall 4 rise 2

    server fitness-1 [2001:db8:2b:20::11]:80 check
    server fitness-2 [2001:db8:2b:20::12]:80 check
    server fitness-3 [2001:db8:2b:20::13]:80 check

backend reject-backend
    mode http
    http-request deny deny_status 403
